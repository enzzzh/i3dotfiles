# transitions
# # requires https://github.com/jonaburg/picom
# (These are also the default values)

#################################
#             Shadows           #
#################################

# Enabled client-side shadows on windows.
shadow = true;

# The blur radius for shadows, in pixels. (defaults to 12)
shadow-radius = 12;

# The left offset for shadows, in pixels. (defaults to -15)
shadow-offset-x = -7;

# The top offset for shadows, in pixels. (defaults to -15)
shadow-offset-y = -7;

#################################
#           Fading              #
#################################

# Fade windows in/out when opening/closing and when opacity changes,
#  unless no-fading-openclose is used.
fading = true;

# Opacity change between steps while fading in. (0.01 - 1.0, defaults to 0.028)
fade-in-step = 0.05;

# Opacity change between steps while fading out. (0.01 - 1.0, defaults to 0.03)
fade-out-step = 0.05;

#################################
#           Corners             #
#################################

# Sets the radius of rounded window corners. 
corner-radius = 10;
round-borders = 1;

#################################
#     Background-Blurring       #
#################################

blur: {
  method = "dual_kawase";
  strength = 5;
};

#################################
#       General Settings        #
#################################

# Specify the backend to use: `xrender`, `glx`, `egl` or `xr_glx_hybrid`.
backend = "glx";

# Enable/disable VSync.
vsync = true;

# Try to detect windows with rounded corners and don't consider them shaped windows.
detect-rounded-corners = true;

# Detect '_NET_WM_WINDOW_OPACITY' on client windows.
detect-client-opacity = true;

# Use 'WM_TRANSIENT_FOR' to group windows.
detect-transient = true;

# Set the log level.
log-level = "warn";

# Window rules
rules = (
    {
        match = "ANY";
        shadow = true;
        fade = true;
        blur-background = true;
        corner-radius = 10;
        opacity = 1.0;
        inactive-opacity = 1.0;
        inactive-dim = 0.0;
    },
    {
        match = "class_g = 'flameshot' || "
                "class_g = 'Rofi' || "
                "window_type = 'dock' || "
                "window_type = 'desktop'";
        shadow = false;
        fade = false;
        blur-background = false;
        corner-radius = 0;
    },
    { match = "class_g = 'i3bar'"; opacity = 0.85; },
    { match = "class_g = 'discord' || class_g = 'vesktop'"; opacity = 0.95; },
    { match = "class_g = 'Rofi'"; opacity = 0.8; },
    { match = "name = 'Zed'"; opacity = 0.85; },
    { match = "class_g = 'Kitty'"; opacity = 0.95; },
    { match = "class_i = 'spotify'"; opacity = 0.8; }
);

#################################
#     Animation Settings    #
#################################

animations = (
  {
    triggers = ["open", "show"];
    opacity = {
      curve = "cubic-bezier(0,1,1,1)";
      duration = 0.3;
      start = 0;
      end = "window-raw-opacity";
    };
    scale-x = {
      curve = "cubic-bezier(0,1.3,1,1)";
      duration = 0.3;
      start = 0.8;
      end = 1;
    };
    scale-y = "scale-x";
  },
  {
    triggers = ["close", "hide"];
    opacity = {
      curve = "linear";
      duration = 0.2;
      start = "window-raw-opacity-before";
      end = 0;
    };
  }
);
